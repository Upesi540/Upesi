<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="UPESI" />
    <meta property="og:description" content="<%= productDescription %>" />
    <meta property="og:image" content="icons/favicon-128x128.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
    <link rel="icon" type="image/ico" href="favicon.ico" />
    <% if (ctx.mode.pwa) { %>
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="<%= pwaManifest.theme_color %>" />
    <link
      rel="mask-icon"
      href="icons/safari-pinned-tab.svg"
      color="<%= pwaManifest.theme_color %>"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="msapplication-TileImage" content="icons/ms-icon-144x144.png" />

    <meta name="msapplication-TileColor" content="#000000" />

    <meta name="apple-mobile-web-app-title" content="<%= pwaManifest.name %>" />
    <% } %>
    <style>
      /* Style du splash screen UPESI */
      #upesi-loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      .upesi-logo {
        font-family: Arial, sans-serif;
        color: #00712d;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 5px;
        margin-bottom: 15px;
      }
      .upesi-progress {
        width: 150px;
        height: 3px;
        background-color: #f0f0f0;
        border-radius: 2px;
        overflow: hidden;
      }
      .upesi-progress-fill {
        width: 100%;
        height: 100%;
        background-color: #00712d;
        transform-origin: left;
        animation: upesi-slide 1.6s infinite ease-in-out;
      }
      @keyframes upesi-slide {
        0% {
          transform: scaleX(0) translateX(0);
        }
        50% {
          transform: scaleX(0.5) translateX(50%);
        }
        100% {
          transform: scaleX(0) translateX(200%);
        }
      }
      .loader-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- quasar:entry-point -->
    <div id="upesi-loader-container">
      <div class="upesi-logo"><img src="/logo.png" height="50" alt="" srcset="" /></div>
      <div class="upesi-progress">
        <div class="upesi-progress-fill"></div>
      </div>
    </div>
  </body>
</html>
